<!DOCTYPE html>
<html lang="en">
<head>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2563eb">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ZiezGeek Aldevinc | Phone Repairs & Accessories</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Poppins',sans-serif;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
}

.navbar{
position:fixed;
top:0;
width:100%;
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 40px;
background:rgba(0,0,0,0.6);
}

.nav-links{
display:flex;
gap:20px;
list-style:none;
}

.nav-links a{
color:white;
text-decoration:none;
cursor:pointer;
}

header{
text-align:center;
padding:150px 20px;
}

.logo-img{
width:150px;
}

section{
padding:60px 20px;
max-width:1100px;
margin:auto;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.product-card{
background:rgba(255,255,255,0.08);
padding:20px;
border-radius:15px;
text-align:center;
}

.product-card img{
width:100%;
border-radius:10px;
}

.buy-btn{
background:#25D366;
border:none;
padding:10px 20px;
border-radius:20px;
cursor:pointer;
margin-top:10px;
}

.pay-btn{
background:#25D366;
border:none;
padding:12px 25px;
border-radius:20px;
cursor:pointer;
}

.hidden{
display:none;
}

</style>
</head>

<body>

<!-- NAVBAR -->

<nav class="navbar">

<div class="logo">
<img src="logo.png" height="45">
</div>

<ul class="nav-links">

<li><a onclick="scrollHome()">Home</a></li>
<li><a href="blog.html">Tech Tips</a></li>
<li><a onclick="showSection('products')">Products</a></li>

<li>
<a onclick="showSection('cart')">
🛒 Cart (<span id="cartCount">0</span>)
</a>
</li>

<li><a onclick="showSection('reviews')">Reviews</a></li>
<li><a onclick="showSection('founder')">Founder</a></li>
<li><a onclick="showSection('payment')">Pay</a></li>

</ul>

</nav>


<!-- HEADER -->

<header>

<img src="logo.png" class="logo-img">

<h1>ZiezGeek Aldevinc 🚀</h1>

<p>Phone Repairs • Unlocking • Accessories</p>

</header>


<!-- PRODUCTS -->

<section id="products" class="hidden">

<h2>Our Products</h2>

<div class="products">


<div class="product-card">

<img src="screen-protector.jpg">

<h3>Screen Protector</h3>

<select id="screenQty">
<option value="80">R80 - 1 piece</option>
<option value="150">R150 - 2 pieces</option>
</select>

<button class="buy-btn"
onclick="addToCart('Screen Protector',document.getElementById('screenQty').value)">
Add to Cart
</button>

</div>


<div class="product-card">

<img src="phone-pouch.jpg">

<h3>Phone Pouch</h3>

<select id="pouchQty">
<option value="100">R100</option>
<option value="180">R180</option>
</select>

<button class="buy-btn"
onclick="addToCart('Phone Pouch',document.getElementById('pouchQty').value)">
Add to Cart
</button>

</div>


<div class="product-card">

<img src="charger.jpg">

<h3>Phone Charger</h3>

<select id="chargerQty">
<option value="200">R200</option>
<option value="350">R350</option>
</select>

<button class="buy-btn"
onclick="addToCart('Charger',document.getElementById('chargerQty').value)">
Add to Cart
</button>

</div>


</div>

</section>


<!-- CART -->

<section id="cart" class="hidden">

<h2>Your Cart</h2>

<div id="cartItems"></div>

<p>Total: R<span id="cartTotal">0</span></p>

<button class="pay-btn" onclick="checkoutCart()">Proceed to Pay</button>

</section>


<!-- PAYMENT -->

<section id="payment" class="hidden">

<h2>Pay Now</h2>

<form action="https://www.payfast.co.za/eng/process" method="post" target="_blank">

<input type="hidden" name="merchant_id" value="32218943">
<input type="hidden" name="merchant_key" value="rmmpojhtpdpvv">

<input type="hidden" name="amount" id="payAmount">
<input type="hidden" name="item_name" id="payItem">

<button type="submit" class="pay-btn">
Pay with PayFast
</button>

</form>

</section>


<script>

/* SHOW SECTION */

function showSection(id){

const sections=["products","cart","payment"];

sections.forEach(function(sec){

document.getElementById(sec).style.display="none";

});

document.getElementById(id).style.display="block";

}


/* HOME */

function scrollHome(){

window.scrollTo({top:0,behavior:'smooth'});

}


/* CART SYSTEM */

let cart=[];


function addToCart(name,price){

price=parseFloat(price);

cart.push({
name:name,
price:price
});

updateCartUI();

}


function removeFromCart(index){

cart.splice(index,1);

updateCartUI();

}


function checkoutCart(){

if(cart.length==0){

alert("Your cart is empty");

return;

}

const items=cart.map(item=>item.name).join(",");

const total=cart.reduce((sum,item)=>sum+item.price,0).toFixed(2);

document.getElementById("payItem").value=items;

document.getElementById("payAmount").value=total;

showSection("payment");

}


/* UPDATE CART */

function updateCartUI(){

const cartDiv=document.getElementById("cartItems");

cartDiv.innerHTML="";

let total=0;

cart.forEach((item,index)=>{

total+=item.price;

cartDiv.innerHTML+=`

<div style="background:rgba(255,255,255,0.08);padding:10px;margin:10px 0;border-radius:10px">

${item.name} - R${item.price}

<button onclick="removeFromCart(${index})">Remove</button>

</div>

`;

});

document.getElementById("cartTotal").innerText=total;

document.getElementById("cartCount").innerText=cart.length;

}

</script>

</body>
 </html>
